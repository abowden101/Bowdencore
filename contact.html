<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BowdenCore | Orlando MSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap'); body{font-family:'Inter',system-ui,sans-serif;} .heading-font{font-family:'Space Grotesk',sans-serif;}</style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <nav class="bg-white dark:bg-zinc-900 border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-[#003087] rounded-2xl flex items-center justify-center text-white text-2xl font-bold">B</div>
                    <span class="heading-font text-2xl font-semibold text-[#003087]">BowdenCore</span>
                </div>
                <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="services.html" class="nav-link">Services</a>
                    <a href="platform.html" class="nav-link">Platform</a>
                    <a href="contact.html" class="nav-link text-orange-500 font-semibold">Contact</a>
                </div>
                <button onclick="window.location.href='contact.html'" class="bg-[#FF6600] text-white px-6 py-2 rounded-2xl text-sm font-semibold">Get Free Assessment</button>
            </div>
        </div>
    </nav>
    <div class="max-w-2xl mx-auto px-6 py-20">
        <h1 class="heading-font text-6xl font-semibold text-center mb-6">Contact Our Orlando Team</h1>
        <p class="text-center text-zinc-600">Ready to improve your IT? Fill out the form below or call our local office.</p>
        <form class="mt-12 space-y-6">
            <input type="text" placeholder="Name" class="w-full px-6 py-4 border rounded-3xl">
            <input type="email" placeholder="Email" class="w-full px-6 py-4 border rounded-3xl">
            <textarea placeholder="Message" rows="6" class="w-full px-6 py-4 border rounded-3xl"></textarea>
            <button type="button" onclick="alert('Thank you! Our Orlando team will contact you shortly.')" class="w-full bg-[#003087] text-white py-5 rounded-3xl font-semibold">Send Message</button>
        </form>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
