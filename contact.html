<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Bowden Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 py-20">
    <div class="max-w-2xl mx-auto px-6">
        <a href="index.html" class="text-blue-600 font-bold mb-8 block">&larr; Back to Home</a>
        <h1 class="text-4xl font-extrabold mb-8">Let's build something.</h1>
        
        <!-- Form -->
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <div class="mb-5">
                <label class="block text-sm font-bold mb-2">Name</label>
                <input type="text" name="name" required class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold mb-2">Project Details</label>
                <textarea name="message" rows="5" required class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">Send Inquiry</button>
        </form>
    </div>
</body>
</html>
